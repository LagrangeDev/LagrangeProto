syntax = "proto3";

package message.v2;

message Elem {
  Text text = 1;
  NotOnlineImage not_online_image = 4;
  CustomFace custom_face = 8;
  RichMsg rich_msg = 12;
  VideoFile video_file = 19;
  SourceMsg src_msg = 45;
  LightAppElem light_app_elem = 51;
  CommonElem common_elem = 53;
}

message Text {
  string text_msg = 1;
  string link = 2;
  bytes attr6_buf = 3;
  bytes attr7_buf = 4;
  bytes buf = 11;
  bytes pb_reserve = 12;
}

message NotOnlineImage {
  bytes file_path = 1;
  uint32 file_len = 2;
  bytes download_path = 3;
  bytes old_ver_send_file = 4;
  uint32 img_type = 5;
  bytes previews_image = 6;
  bytes pic_md5 = 7;
  uint32 pic_height = 8;
  uint32 pic_width = 9;
  bytes res_id = 10;
  bytes flag = 11;
  string thumb_url = 12;
  uint32 original = 13;
  string big_url = 14;
  string orig_url = 15;
  uint32 biz_type = 16;
  uint32 result = 17;
  uint32 index = 18;
  bytes op_face_buf = 19;
  bool old_pic_md5 = 20;
  uint32 thumb_width = 21;
  uint32 thumb_height = 22;
  uint32 file_id = 23;
  uint32 show_len = 24;
  uint32 download_len = 25;
  string url400 = 26;
  uint32 width400 = 27;
  uint32 height400 = 28;
  bytes pb_reserve = 29;
}

message CustomFace {
  bytes guid = 1;
  string file_path = 2;
  string shortcut = 3;
  bytes buffer = 4;
  bytes flag = 5;
  bytes old_data = 6;
  uint32 file_id = 7;
  int32 server_ip = 8;
  int32 server_port = 9;
  int32 file_type = 10;
  bytes signature = 11;
  int32 useful = 12;
  bytes md5 = 13;
  string thumb_url = 14;
  string big_url = 15;
  string orig_url = 16;
  int32 biz_type = 17;
  int32 repeat_index = 18;
  int32 repeat_image = 19;
  int32 image_type = 20;
  int32 index = 21;
  int32 width = 22;
  int32 height = 23;
  int32 source = 24;
  uint32 size = 25;
  int32 origin = 26;
  int32 thumb_width = 27;
  int32 thumb_height = 28;
  int32 show_len = 29;
  int32 download_len = 30;
  string x400_url = 31;
  int32 x400_width = 32;
  int32 x400_height = 33;
  PbReserve1 pb_reserve = 34;
}

message RichMsg {
  bytes bytes_template1 = 1;
  uint32 service_id = 2;
  bytes bytes_msg_resid = 3;
  uint32 rand = 4;
  uint32 seq = 5;
  uint32 flags = 6;
}

message VideoFile {
  string file_uuid = 1;
  bytes file_md5 = 2;
  string file_name = 3;
  int32 file_format = 4;
  int32 file_time = 5;
  int32 file_size = 6;
  int32 thumb_width = 7;
  int32 thumb_height = 8;
  bytes thumb_file_md5 = 9;
  bytes source = 10;
  int32 thumb_file_size = 11;
  int32 busi_type = 12;
  int32 from_chat_type = 13;
  int32 to_chat_type = 14;
  bool bool_support_progressive = 15;
  int32 file_width = 16;
  int32 file_height = 17;
  int32 sub_busi_type = 18;
  int32 video_attr = 19;
  repeated bytes bytes_thumb_file_urls = 20;
  repeated bytes bytes_video_file_urls = 21;
  int32 thumb_download_flag = 22;
  int32 video_download_flag = 23;
  bytes pb_reserve = 24;
}

message SourceMsg {
  repeated uint32 orig_seqs = 1;
  uint64 sender_uin = 2;
  uint32 time = 3;
  uint32 flag = 4;
  repeated bytes elems = 5;
  uint32 type = 6;
  bytes rich_msg = 7;
  bytes pb_reserve = 8;
  bytes src_msg = 9;
  uint64 to_uin = 10;
  bytes troop_name = 11;
}

message LightAppElem {
  bytes bytes_data = 1;
  bytes bytes_msg_resid = 2;
}

message CommonElem {
  uint32 service_type = 1;
  bytes pb_elem = 2;
  uint32 business_type = 3;
}

message FileExtra {
  NotOnlineFile file = 1;
}

message TextResvAttr {
  string wording = 1;
  uint32 text_analysis_result = 2;
  uint32 at_type = 3;
  uint64 at_member_uin = 4;
  uint64 at_member_tinyid = 5;
  RoleInfo at_member_role_info = 6;
  RoleInfo at_role_info = 7;
  ChannelInfo at_channel_info = 8;
  string at_member_uid = 9;
}

message ChannelInfo {
  uint64 guild_id = 1;
  uint64 channel_id = 2;
}

message RoleInfo {}

message SourceMsgResvAttr {
  uint32 ori_msg_type = 2;
  uint64 source_msg_id = 3;
  string sender_uid = 6;
  string receiver_uid = 7;
}

message FeedsInfo {
  uint32 bus_id = 1;
  string file_id = 2;
  uint32 msg_random = 3;
  bytes ext = 4;
  uint32 feed_flag = 5;
}

message FeedsResult {
  int32 ret_code = 1;
  string detail = 2;
  string file_id = 3;
  uint32 bus_id = 4;
  uint32 dead_time = 5;
}

message FileInfo {
  string file_id = 1;
  string file_name = 2;
  uint64 file_size = 3;
  uint32 bus_id = 4;
  uint64 uploaded_size = 5;
  uint32 upload_time = 6;
  uint32 dead_time = 7;
  uint32 modify_time = 8;
  uint32 download_times = 9;
  bytes sha = 10;
  bytes sha3 = 11;
  bytes md5 = 12;
  string local_path = 13;
  string uploader_name = 14;
  uint64 uploader_uin = 15;
  string parent_folder_id = 16;
  uint32 safe_type = 17;
  bytes file_blob_ext = 20;
  uint64 owner_uin = 21;
  string feed_id = 22;
  bytes reserved_field = 23;
}

message FileInfoTmem {
  uint64 group_code = 1;
  repeated FileInfo files = 2;
}

message FileItem {
  uint32 type = 1;
  FolderInfo folder_info = 2;
  FileInfo file_info = 3;
}

message FolderInfo {
  string folder_id = 1;
  string parent_folder_id = 2;
  string folder_name = 3;
  uint32 create_time = 4;
  uint32 modify_time = 5;
  uint64 create_uin = 6;
  string creator_name = 7;
  uint32 total_file_count = 8;
  uint64 modify_uin = 9;
  string modify_name = 10;
  uint64 used_space = 11;
}

message FolderInfoItem {
  uint64 group_code = 1;
  repeated FolderInfo folders = 2;
}

message OverwriteInfo {
  string file_id = 1;
  uint32 download_times = 2;
}

message PbMultiMsgTransmit {
  repeated CommonMessage messages = 1;
  repeated PbMultiMsgItem items = 2;
}

message PbMultiMsgItem {
  string file_name = 1;
  PbMultiMsgNew buffer = 2;
}

message PbMultiMsgNew {
  repeated CommonMessage msg = 1;
}

message LongMsgInterfaceReq {
  LongMsgRecvReq recv_req = 1;
  LongMsgSendReq send_req = 2;
  LongMsgAttr attr = 15;
}

message LongMsgInterfaceRsp {
  LongMsgRecvRsp recv_rsp = 1;
  LongMsgSendRsp send_rsp = 2;
  LongMsgAttr attr = 15;
}

message LongMsgAttr {
  uint32 sub_cmd = 1;
  uint32 client_type = 2;
  uint32 platform = 3;
  uint32 proxy_type = 4;
}

message LongMsgPeerInfo {
  string peer_uid = 2;
}

message LongMsgRecvReq {
  LongMsgPeerInfo peer_info = 1;
  string res_id = 2;
  uint32 msg_type = 3;
}

message LongMsgSendReq {
  uint32 msg_type = 1;
  LongMsgPeerInfo peer_info = 2;
  int64 group_uin = 3;
  bytes payload = 4;
}

message LongMsgSendRsp {
  string res_id = 3;
}

message LongMsgRecvRsp {
  string res_id = 3;
  bytes payload = 4;
}

message CommonMessage {
  RoutingHead routing_head = 1;
  ContentHead content_head = 2;
  MessageBody message_body = 3;
}

message ContentHead {
  int32 type = 1;
  int32 sub_type = 2;
  int32 c2_c_command = 3;
  uint32 random = 4;
  int32 sequence = 5;
  int64 time = 6;
  int32 pkg_num = 7;
  int32 pkg_index = 8;
  int32 div_seq = 9;
  int32 auto_reply = 10;
  int32 client_sequence = 11;
  uint64 msg_uid = 12;
}

message RoutingHead {
  int64 from_uin = 1;
  string from_uid = 2;
  int32 from_app_id = 3;
  int32 from_inst_id = 4;
  int64 to_uin = 5;
  string to_uid = 6;
  CommonC2C common_c2_c = 7;
  CommonGroup group = 8;
}

message CommonC2C {
  int32 c2_c_type = 1;
  int32 service_type = 2;
  bytes sig = 3;
  int64 from_tiny_id = 4;
  int64 to_tiny_id = 5;
  string name = 6;
}

message CommonGroup {
  int64 group_code = 1;
  int32 group_type = 2;
  int64 group_info_seq = 3;
  string group_card = 4;
  int32 group_card_type = 5;
  int32 group_level = 6;
  string group_name = 7;
  string ext_group_key_info = 8;
  int32 msg_flag = 9;
}

message MessageBody {
  RichText rich_text = 1;
  bytes msg_content = 2;
  bytes msg_encrypt_content = 3;
}

message RichText {
  Attr attr = 1;
  repeated Elem elems = 2;
  NotOnlineFile not_online_file = 3;
  Ptt ptt = 4;
  TmpPtt tmp_ptt = 5;
  Trans211TmpMsg trans211_tmp_msg = 6;
}

message Attr {
  int32 code_page = 1;
  int32 time = 2;
  int32 play_mode_random = 3;
  int32 color = 4;
  int32 size = 5;
  int32 tab_effect = 6;
  int32 char_set = 7;
  int32 pitch_and_family = 8;
  string font_name = 9;
  bytes reserve_data = 10;
}

message NotOnlineFile {
  uint32 file_type = 1;
  bytes sig = 2;
  string file_uuid = 3;
  bytes file_md5 = 4;
  string file_name = 5;
  uint64 file_size = 6;
  bytes note = 7;
  uint32 reserved = 8;
  uint32 sub_cmd = 9;
  uint32 micro_cloud = 10;
  repeated bytes file_urls = 11;
  uint32 download_flag = 12;
  uint32 danger_level = 50;
  uint32 life_time = 51;
  uint32 upload_time = 52;
  uint32 abs_file_type = 53;
  uint32 client_type = 54;
  uint32 expire_time = 55;
  bytes pb_reserve = 56;
  string file_id_crc_media = 57;
}

message Ptt {
  uint32 file_type = 1;
  uint64 src_uin = 2;
  bytes file_uuid = 3;
  bytes file_md5 = 4;
  string file_name = 5;
  uint32 file_size = 6;
  bytes reserve = 7;
  uint32 file_id = 8;
  uint32 server_ip = 9;
  uint32 server_port = 10;
  bool valid = 11;
  bytes signature = 12;
  bytes shortcut = 13;
  string file_key = 14;
  uint32 magic_ptt_index = 15;
  uint32 voice_switch = 16;
  bytes ptt_url = 17;
  bytes group_file_key = 18;
  uint32 time = 19;
  bytes down_para = 20;
  uint32 format = 29;
  bytes pb_reserve = 30;
  repeated bytes ptt_urls = 31;
  uint32 download_flag = 32;
}

message TmpPtt {
  uint32 file_type = 1;
  bytes file_uuid = 2;
  bytes file_md5 = 3;
  bytes file_name = 4;
  uint32 file_size = 5;
  uint32 ptt_times = 6;
  uint32 user_type = 7;
  uint32 ptt_trans_flag = 8;
  uint32 busi_type = 9;
  uint64 msg_id = 10;
  bytes pb_reserve = 30;
  bytes ptt_encode_data = 31;
}

message Trans211TmpMsg {
  bytes msg_body = 1;
  uint32 c2_c_cmd = 2;
}

message MsgPush {
  CommonMessage common_message = 1;
  bool push_notify_flag = 5;
}

message PbSendMsgReq {
  SendRoutingHead routing_head = 1;
  SendContentHead content_head = 2;
  MessageBody message_body = 3;
  int32 client_sequence = 4;
  uint32 random = 5;
}

message PbSendMsgResp {
  int32 result = 1;
  string err_msg = 2;
  int64 send_time = 3;
  uint32 msg_info_flag = 10;
  int32 sequence = 11;
  int32 client_sequence = 14;
}

message SendContentHead {
  uint32 pkg_num = 1;
  uint32 pkg_index = 2;
  uint32 div_seq = 3;
  uint32 auto_reply = 4;
}

message SendRoutingHead {
  C2C c2_c = 1;
  Grp group = 2;
  Trans0X211 trans0_x211 = 15;
}

message C2C {
  int64 peer_uin = 1;
  string peer_uid = 2;
}

message Grp {
  int64 group_uin = 1;
}

message Trans0X211 {
  int64 to_uin = 1;
  uint32 cc_cmd = 2;
  string uid = 8;
}

message SsoGetC2CMsgReq {
  int64 peer_uin = 1;
  string peer_uid = 2;
  int32 start_sequence = 3;
  int32 end_sequence = 4;
}

message SsoGetC2CMsgRsp {
  uint32 retcode = 1;
  string message = 2;
  uint32 start_sequence = 3;
  uint32 end_sequence = 4;
  repeated CommonMessage messages = 7;
}

message SsoGetGroupMsg {
  SsoGetGroupMsgInfo info = 1;
  uint32 filter = 2;
}

message SsoGetGroupMsgInfo {
  int64 group_uin = 1;
  int32 start_sequence = 2;
  int32 end_sequence = 3;
}

message SsoGetGroupMsgRsp {
  uint32 ret_code = 1;
  string error_msg = 2;
  SsoGetGroupMsgRspBody body = 3;
}

message SsoGetGroupMsgRspBody {
  uint32 retcode = 1;
  string message = 2;
  uint32 group_uin = 3;
  uint32 start_sequence = 4;
  uint32 end_sequence = 5;
  repeated CommonMessage messages = 6;
}

message SsoGetRoamMsgReq {
  string peer_uid = 1;
  uint32 time = 2;
  uint32 random = 3;
  uint32 count = 4;
  uint32 direction = 5;
}

message SsoGetRoamMsgRsp {
  string peer_uid = 3;
  bool is_complete = 4;
  uint32 timestamp = 5;
  uint32 random = 6;
  repeated CommonMessage messages = 7;
}

message PbReserve1 {
  int32 sub_type = 1;
  int32 field3 = 3;
  int32 field4 = 4;
  string summary = 9;
  int32 field10 = 10;
  PbReserve2 field21 = 21;
  string field31 = 31;
}

message PbReserve2 {
  int32 field1 = 1;
  string field2 = 2;
  int32 field3 = 3;
  int32 field4 = 4;
  int32 field5 = 5;
  string md5_str = 7;
}
