syntax = "proto3";

package login.v2;

enum NTLoginPlatform {
  NT_LOGIN_PLATFORM_UNKNOWN = 0;
  NT_LOGIN_PLATFORM_IOS = 1;
  NT_LOGIN_PLATFORM_ANDROID = 2;
  NT_LOGIN_PLATFORM_SYMBIAN = 3;
  NT_LOGIN_PLATFORM_WINDOWS = 4;
  NT_LOGIN_PLATFORM_MAC = 5;
  NT_LOGIN_PLATFORM_IPAD = 6;
  NT_LOGIN_PLATFORM_LINUX = 7;
  NT_LOGIN_PLATFORM_HARMONY = 8;
}

enum NTLoginCodeType {
  NT_LOGIN_CODE_TYPE_AUTHCODE = 0;
  NT_LOGIN_CODE_TYPE_TGT = 1;
  NT_LOGIN_CODE_TYPE_A2 = 2;
  NT_LOGIN_CODE_TYPE_TGTGT = 3;
}

message KeyExchangeRequest {
  bytes public_key = 1;
  uint32 type = 2;
  bytes secret = 3;
  int64 timestamp = 4;
  bytes verify_hash = 5;
}

message KeyExchangeResponse {
  bytes secret = 1;
  bytes field2 = 2;
  bytes public_key = 3;
}

message KeyExchangeRequestBuf {
  string uin = 1;
  bytes guid = 2;
}

message KeyExchangeResponseSecret {
  bytes session_key = 1;
  bytes session_ticket = 2;
  uint32 expiration = 3;
}

message NTLoginForwardRequest {
  bytes session_ticket = 1;
  bytes buffer = 3;
  uint32 type = 4;
}

message NTLoginHead {
  NTLoginUserInfo user_info = 1;
  NTLoginClientInfo client_info = 2;
  NTLoginAppInfo app_info = 3;
  NTLoginErrorInfo error_info = 4;
  NTLoginCookie cookie = 5;
  NTLoginSecurityInfo security_info = 6;
  NTLoginSdkInfo sdk_info = 7;
  NTLoginLongCookie long_cookie = 8;
}

message NTLoginUserInfo {
  string account = 1;
  uint32 country_code = 2;
}

message NTLoginClientInfo {
  string device_type = 1;
  string device_name = 2;
  NTLoginPlatform platform = 3;
  bytes guid = 4;
  uint32 pubno = 5;
  uint32 client_ver = 6;
  uint32 client_type = 7;
  uint32 sso_ver = 8;
}

message NTLoginAppInfo {
  string version = 1;
  int32 app_id = 2;
  string app_name = 3;
  uint32 client_a1_version = 4;
  string qua = 5;
  NTLoginOpenInfo open_info = 6;
}

message NTLoginOpenInfo {
  uint32 app_id = 1;
}

message NTLoginSdkInfo {
  uint32 version = 1;
}

message NTLoginSecurityInfo {}

message NTLoginCookie {
  string cookie_content = 1;
}

message NTLoginLongCookie {
  bytes content = 1;
}

message NTLoginErrorInfo {
  uint64 err_code = 1;
  string str_tips_title = 2;
  string str_tips_content = 3;
  string str_jump_wording = 4;
  string str_jump_url = 5;
  NTLoginErrorDetail msg_detail = 6;
  repeated NTLoginButton rpt_msg_button = 7;
}

message NTLoginErrorDetail {
  NTLoginErrorNeedVerifyNewDevice msg_need_verify_new_device = 1;
  NTLoginErrorUnregistered msg_unregistered = 2;
  NTLoginErrorBeenForbiden msg_been_forbiden = 3;
  NTLoginErrorNiceAccountExpire msg_nice_account_expire = 4;
}

message NTLoginErrorNeedVerifyNewDevice {
  bool allow_gate_way_verify = 1;
}

message NTLoginErrorUnregistered {
  string unregistered_sig = 1;
}

message NTLoginErrorBeenForbiden {
  uint32 area = 1;
}

message NTLoginErrorNiceAccountExpire {
  string expire_sig = 1;
}

message NTLoginButton {
  string wording = 1;
  string url = 2;
}

message NTLoginCommonInfo {
  uint32 face = 1;
  string nick = 2;
  uint32 gender = 3;
  uint32 flag = 4;
  uint32 age = 5;
  int32 svr_flag = 6;
}

message NTLoginTgtInfo {
  bytes tgt = 1;
  bytes gtkey_tgt = 2;
  uint32 tgt_ver = 3;
  uint64 priority = 4;
  uint64 refresh_interval = 5;
  uint64 validate_interval = 6;
  uint64 try_refresh_interval = 7;
  uint64 try_refresh_count = 8;
  uint64 dst_appid = 9;
  bytes gtkey_tgtpwd = 10;
  NTLoginCommonInfo comm_info = 11;
  bytes sig_session = 12;
  bytes sig_session_key = 13;
  uint64 next_refresh_gap = 14;
}

message NTLoginSTInfo {
  bytes st = 1;
  bytes gtkey_st = 2;
}

message NTLoginSTHttpInfo {
  uint32 allow_ptlogin = 1;
  bytes st_http = 2;
  bytes gtkey_st_http = 3;
}

message NTLoginControlRefreshTime {
  uint64 next_start_refresh_time = 1;
  uint64 expire_time = 2;
}

message NTLoginTickets {
  bytes a1 = 3;
  bytes a2 = 4;
  bytes d2 = 5;
  bytes d2_key = 6;
  bytes auth_code = 7;
  NTLoginTgtInfo tgt_info = 8;
  NTLoginSTInfo st_info = 9;
  bytes sec_extra = 10;
  NTLoginSTHttpInfo st_http_info = 11;
  NTLoginControlRefreshTime a1_refresh_time = 12;
  bytes nopicsig = 13;
  bytes a1_key = 14;
  uint64 a1_seq = 15;
  NTLoginControlRefreshTime a2_refresh_time = 16;
  bytes a2_key = 17;
}

message NTLoginUserProfile {
  bytes nick_name = 1;
  bool register_without_password = 2;
}

message NTLoginAccoutInfo {
  uint64 uin = 1;
  string uid = 2;
  NTLoginUserProfile user_profile = 3;
}

message NTLoginIframe {
  string iframe_sig = 1;
  string iframe_randstr = 2;
  string iframe_sid = 3;
}

message NTLoginSecProtect {
  bytes new_device_check_sig = 1;
  bytes unusual_device_check_sig = 2;
  string unusual_device_qr_sig = 3;
  string uin_token = 4;
}

message NTLoginSecCheck {
  string iframe_url = 3;
}

message NTLoginLoginProcessReqBody {
  bool need_remind_cancellated_status = 1;
}

message NTLoginLoginProcessRspBody {}

message NTLoginPasswordLoginReqBody {
  bytes a1 = 1;
  NTLoginIframe iframe = 2;
  bytes new_device_check_succeed_sig = 3;
  string register_succeed_sig = 4;
  NTLoginLoginProcessReqBody login_process_req = 5;
}

message NTLoginPasswordLoginRspBody {
  NTLoginTickets tickets = 1;
  NTLoginSecCheck sec_check = 2;
  NTLoginSecProtect sec_protect = 3;
  NTLoginAccoutInfo account = 4;
  NTLoginLoginProcessRspBody login_process_rsp = 5;
}

message NTLoginPasswordLoginNewDeviceReqBody {
  bytes new_device_check_succeed_sig = 1;
}

message NTLoginPasswordLoginNewDeviceRspBody {
  NTLoginTickets tickets = 1;
  NTLoginAccoutInfo account = 3;
}

message NTLoginPasswordLoginUnusualDeviceReqBody {
  bytes a1 = 1;
  bytes unusual_device_check_succeed_sig = 2;
}

message NTLoginPasswordLoginUnusualDeviceRspBody {
  NTLoginTickets tickets = 1;
  NTLoginAccoutInfo account = 2;
}

message NTLoginEasyLoginReqBody {
  bytes a1 = 1;
}

message NTLoginEasyLoginRspBody {
  NTLoginTickets tickets = 1;
  NTLoginSecCheck sec_check = 2;
  NTLoginSecProtect sec_protect = 3;
}

message NTLoginEasyLoginUnusualDeviceReqBody {
  bytes a1 = 1;
  bytes unusual_device_check_succeed_sig = 2;
}

message NTLoginEasyLoginUnusualDeviceRspBody {
  NTLoginTickets tickets = 1;
}

message NTLoginTGTExchangeFastLoginReqBody {
  bytes tgt = 1;
  bytes sec_extra = 2;
  int32 code_type = 3;
}

message NTLoginTGTExchangeFastLoginRspBody {
  NTLoginTickets tickets = 1;
}

message NTLoginRefreshTicketReqBody {
  bytes a1 = 1;
  bytes nopicsig = 2;
}

message NTLoginRefreshTicketRspBody {
  NTLoginTickets tickets = 1;
  NTLoginAccoutInfo account = 2;
}

message NTLoginRefreshA2ReqBody {
  bytes a2 = 1;
  bytes d2 = 2;
  bytes d2_key = 3;
}

message NTLoginRefreshA2RspBody {
  NTLoginTickets tickets = 1;
  NTLoginAccoutInfo account = 2;
}

message NTLoginCommon {
  NTLoginHead head = 1;
  bytes body = 2;
}

message QrLogin {
  uint32 scan_result = 1;
  SafeInfo safe_info = 2;
  RiskInfo risk_info = 3;
  RejectInfo reject_info = 4;
  TipsCtrl tips_ctrl = 5;
  AutoRenewTicketInfo auto_renew_ticket_info = 6;
}

message SafeInfo {
  string tips_template = 1;
  string login_loc = 2;
  string app_name = 3;
  string new_tips_template = 4;
}

message RiskInfo {
  string tips_template = 1;
  string login_loc = 2;
  string app_name = 3;
  string new_tips_template = 4;
}

message RejectInfo {
  string tips = 1;
}

message AutoRenewTicketInfo {
  bool is_show_switch = 1;
  bool is_open_switch = 2;
  string tips_title = 3;
  string tips_template = 4;
}

message TipsCtrl {
  uint32 normal_tips_color = 1;
  bool sec_check = 2;
  string sec_check_tips = 3;
  uint32 sec_tips_color = 4;
}

message DevInfo {
  string dev_type = 1;
  string dev_name = 2;
}

message GenInfo {
  uint32 client_type = 1;
  uint32 client_ver = 2;
  uint32 client_appid = 3;
  uint32 field6 = 6;
}

message QrExtInfo {
  DevInfo dev_info = 1;
  string qr_url = 2;
  string qr_sig = 3;
  GenInfo gen_info = 4;
}

message ScanExtInfo {
  bytes guid = 1;
  string imei = 2;
  uint32 scan_scene = 3;
  bool allow_auto_renew_ticket = 4;
  bool invalid_gen_ticket = 5;
}

message DeviceReport {
  string bootloader = 1;
  string proc_version = 2;
  string code_name = 3;
  string incremental = 4;
  string fingerprint = 5;
  string boot_id = 6;
  string android_id = 7;
  string base_band = 8;
  string inner_version = 9;
}
