syntax = "proto3";

package notify.v2;

message Event0x20D {
  uint64 sub_type = 1;
  bytes body = 2;
}

message FriendRequest {
  FriendRequestInfo info = 1;
}

message FriendRequestInfo {
  string target_uid = 1;
  string source_uid = 2;
  string new_source = 5;
  string message = 10;
  string source = 11;
}

message GroupChange {
  uint32 group_uin = 1;
  uint32 flag = 2;
  string member_uid = 3;
  uint32 decrease_type = 4;
  bytes operator = 5;
  uint32 increase_type = 6;
  bytes field7 = 7;
}

message OperatorInfo {
  OperatorField1 operator = 1;
}

message OperatorField1 {
  string uid = 1;
  uint32 field2 = 2;
  bytes field3 = 3;
  uint32 field4 = 4;
  bytes field5 = 5;
}

message EssenceMessage {
  int64 group_uin = 1;
  int64 msg_sequence = 2;
  uint32 random = 3;
  uint32 set_flag = 4;
  uint32 member_uin = 5;
  uint32 operator_uin = 6;
  uint32 time_stamp = 7;
  uint32 msg_sequence2 = 8;
  string operator_nick_name = 9;
  string member_nick_name = 10;
  uint32 set_flag2 = 11;
}

message GroupInvite {
  GroupInviteBody body = 1;
}

message GroupInviteBody {
  int64 group_uin = 1;
  string target_uid = 5;
  string inviter_uid = 6;
}

message GroupJoin {
  int64 group_uin = 1;
  uint64 type = 2;
  string target_uid = 3;
  string comment = 5;
}

message GroupReactionData0 {
  GroupReactionData1 data = 1;
}

message GroupReactionData1 {
  GroupReactionData2 data = 1;
}

message GroupReactionData2 {
  GroupReactionTarget target = 2;
  GroupReactionData3 data = 3;
}

message GroupReactionTarget {
  int64 sequence = 1;
}

message GroupReactionData3 {
  string code = 1;
  uint32 count = 3;
  string operator_uid = 4;
  uint32 type = 5;
}

message GroupRecall {
  string operator_uid = 1;
  repeated RecallMessage recall_messages = 3;
  bytes user_def = 5;
  int32 group_type = 6;
  int32 op_type = 7;
  GroupRecallTipInfo tip_info = 9;
}

message RecallMessage {
  uint32 sequence = 1;
  uint32 time = 2;
  uint32 random = 3;
  uint32 type = 4;
  uint32 flag = 5;
  string author_uid = 6;
}

message GroupRecallTipInfo {
  string tip = 2;
}

message GroupRecallNudge {
  string operator_uid = 1;
  int64 group_uin = 3;
  uint64 busi_id = 4;
  uint64 tips_seq_id = 5;
}

message NotifyMessageBody {
  uint32 type = 1;
  int64 group_uin = 4;
  bytes event_param = 5;
  GroupRecall recall = 11;
  uint32 field13 = 13;
  string operator_uid = 21;
  GeneralGrayTipInfo general_gray_tip = 26;
  int64 msg_sequence = 37;
  uint32 field39 = 39;
  GroupRecallNudge group_recall_nudge = 40;
  GroupReactionData0 reaction = 44;
  uint64 tips_seq_id = 50;
  EssenceMessage essence_message = 33;
}

message GeneralGrayTipInfo {
  uint64 busi_type = 1;
  uint64 busi_id = 2;
  uint32 ctrl_flag = 3;
  uint32 c2_c_type = 4;
  uint32 service_type = 5;
  uint64 templ_id = 6;
  repeated TemplParam msg_templ_param = 7;
  string content = 8;
  uint64 tips_seq_id = 10;
  GrayTipMsgInfo msg_info = 100;
}

message GrayTipMsgInfo {
  uint64 sequence = 6;
}

message TemplParam {
  string name = 1;
  string value = 2;
}

message FriendRecallPokeInfo {
  string self_uid = 1;
  string peer_uid = 2;
  string operator_uid = 3;
  uint64 busi_id = 4;
  uint64 tips_seq_id = 5;
}
