syntax = "proto3";

package service.v2;

message FetchGroupMembersRequest {
  int64 group_uin = 1;
  uint32 field2 = 2;
  uint32 field3 = 3;
  FetchGroupMembersRequestBody body = 4;
  bytes cookie = 15;
}

message FetchGroupMembersRequestBody {
  bool member_name = 10;
  bool member_card = 11;
  bool level = 12;
  bool field13 = 13;
  bool field16 = 16;
  bool special_title = 17;
  bool field18 = 18;
  bool field20 = 20;
  bool field21 = 21;
  bool join_timestamp = 100;
  bool last_msg_timestamp = 101;
  bool shut_up_timestamp = 102;
  bool field103 = 103;
  bool field104 = 104;
  bool field105 = 105;
  bool field106 = 106;
  bool permission = 107;
  bool field200 = 200;
  bool field201 = 201;
}

message FetchGroupMembersResponse {
  int64 group_uin = 1;
  repeated FetchGroupMembersResponseMember members = 2;
  uint32 member_count = 3;
  uint32 member_list_change_seq = 5;
  uint32 member_card_seq = 6;
  bytes cookie = 15;
}

message FetchGroupMembersResponseMember {
  FetchGroupMembersResponseId id = 1;
  string member_name = 10;
  string special_title = 17;
  FetchGroupMembersResponseCard member_card = 11;
  FetchGroupMembersResponseLevel level = 12;
  uint32 join_timestamp = 100;
  uint32 last_msg_timestamp = 101;
  uint32 shut_up_timestamp = 102;
  uint32 permission = 107;
}

message FetchGroupMembersResponseId {
  string uid = 2;
  uint32 uin = 4;
}

message FetchGroupMembersResponseCard {
  string member_card = 2;
}

message FetchGroupMembersResponseLevel {
  repeated uint32 infos = 1;
  uint32 level = 2;
}

message FetchGroupNotificationsRequest {
  uint64 count = 1;
  uint64 start_sequence = 2;
}

message FetchGroupNotificationsResponse {
  repeated FetchGroupNotificationsResponseNotification group_notifications = 1;
}

message FetchGroupNotificationsResponseNotification {
  uint64 sequence = 1;
  uint64 type = 2;
  uint64 state = 3;
  FetchGroupNotificationsResponseNotificationGroup group = 4;
  FetchGroupNotificationsResponseNotificationUser target = 5;
  FetchGroupNotificationsResponseNotificationUser inviter = 6;
  FetchGroupNotificationsResponseNotificationUser operator = 7;
  string comment = 10;
}

message FetchGroupNotificationsResponseNotificationGroup {
  int64 group_uin = 1;
}

message FetchGroupNotificationsResponseNotificationUser {
  string uid = 1;
}

message FetchGroupsRequest {
  FetchGroupsRequestConfig config = 1;
}

message FetchGroupsRequestConfig {
  FetchGroupsRequestConfig1 config1 = 1;
  FetchGroupsRequestConfig2 config2 = 2;
  FetchGroupsRequestConfig3 config3 = 3;
}

message FetchGroupsRequestConfig1 {
  bool group_owner = 1;
  bool field2 = 2;
  bool member_max = 3;
  bool member_count = 4;
  bool group_name = 5;
  bool field8 = 8;
  bool field9 = 9;
  bool field10 = 10;
  bool field11 = 11;
  bool field12 = 12;
  bool field13 = 13;
  bool field14 = 14;
  bool field15 = 15;
  bool field16 = 16;
  bool field17 = 17;
  bool field18 = 18;
  bool question = 19;
  bool field20 = 20;
  bool field22 = 22;
  bool field23 = 23;
  bool field24 = 24;
  bool field25 = 25;
  bool field26 = 26;
  bool field27 = 27;
  bool field28 = 28;
  bool field29 = 29;
  bool field30 = 30;
  bool field31 = 31;
  bool field32 = 32;
  bool field5001 = 5001;
  bool field5002 = 5002;
  bool field5003 = 5003;
}

message FetchGroupsRequestConfig2 {
  bool field1 = 1;
  bool field2 = 2;
  bool field3 = 3;
  bool field4 = 4;
  bool field5 = 5;
  bool field6 = 6;
  bool field7 = 7;
  bool field8 = 8;
}

message FetchGroupsRequestConfig3 {
  bool field5 = 5;
  bool field6 = 6;
}

message FetchGroupsResponse {
  repeated FetchGroupsResponseGroup groups = 2;
}

message FetchGroupsResponseGroup {
  int64 group_uin = 3;
  FetchGroupsResponseGroupInfo info = 4;
  FetchGroupsResponseCustomInfo custom_info = 5;
}

message FetchGroupsResponseGroupInfo {
  FetchGroupsResponseMember group_owner = 1;
  uint32 created_time = 2;
  uint32 member_max = 3;
  uint32 member_count = 4;
  string group_name = 5;
  string description = 18;
  string question = 19;
  string announcement = 30;
}

message FetchGroupsResponseCustomInfo {
  int64 last_speak_time = 1;
  uint32 lastest_seq = 5;
}

message FetchGroupsResponseMember {
  string remark = 3;
}

message FetchStrangerByUidRequest {
  string uid = 1;
  repeated FetchStrangerRequestKey keys = 3;
}

message FetchStrangerByUinRequest {
  int64 uin = 1;
  repeated FetchStrangerRequestKey keys = 3;
}

message FetchStrangerRequestKey {
  uint64 key = 1;
}

message FetchStrangerResponse {
  FetchStrangerResponseBody body = 1;
}

message FetchStrangerResponseBody {
  FetchStrangerResponseProperties properties = 2;
  uint32 uin = 3;
}

message FetchStrangerResponseProperties {
  repeated FetchStrangerResponseNumberProperties number_properties = 1;
  repeated FetchStrangerResponseBytesProperties bytes_properties = 2;
}

message FetchStrangerResponseNumberProperties {
  uint64 key = 1;
  uint64 value = 2;
}

message FetchStrangerResponseBytesProperties {
  uint64 key = 1;
  bytes value = 2;
}

message SetGroupNotificationRequest {
  uint64 operate = 1;
  SetGroupNotificationRequestBody body = 2;
}

message SetGroupNotificationRequestBody {
  uint64 sequence = 1;
  uint64 type = 2;
  int64 group_uin = 3;
  string message = 4;
}

message SetGroupNotificationResponse {}

message C501ReqBody {
  SubCmd0x501ReqBody req_body = 1281;
}

message C501RspBody {
  SubCmd0x501RspBody rsp_body = 1281;
}

message SubCmd0x501ReqBody {
  uint64 uin = 1;
  uint32 idc_id = 2;
  uint32 appid = 3;
  uint32 login_sig_type = 4;
  bytes login_sig_ticket = 5;
  uint32 request_flag = 6;
  repeated uint32 service_types = 7;
  uint32 bid = 8;
  int32 field9 = 9;
  int32 field10 = 10;
  int32 field11 = 11;
  string version = 15;
}

message SubCmd0x501RspBody {
  bytes sig_session = 1;
  bytes session_key = 2;
  repeated SrvAddrs addrs = 3;
}

message SrvAddrs {
  uint32 service_type = 1;
  repeated IpAddr addrs = 2;
}

message IpAddr {
  uint32 type = 1;
  sint32 ip = 2;
  uint32 port = 3;
  uint32 area = 4;
}
