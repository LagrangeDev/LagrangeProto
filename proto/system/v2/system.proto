syntax = "proto3";
package system.v2;

import "message/v2/message.proto";

message InfoSyncPush {
  uint32 result = 1;
  string err_msg = 2;
  uint32 push_flag = 3;
  uint32 push_seq = 4;
  uint32 retry_flag = 5;
  repeated GroupNode group_nodes = 6;
  GroupSystemNotifications notifications = 7;
  SystemNotifications sys_notifications = 8;
  uint32 use_init_cache_data = 10;
  GuildNode guild_nodes = 11;
  uint32 discuss_list_flag = 12;
  uint32 roam_msg_optimize_flag = 13;
  uint32 group_guild_flag = 14;
}

message GroupNode {
  uint64 group_code = 1;
  uint64 group_seq = 2;
  uint64 read_msg_seq = 3;
  uint64 mask = 4;
  uint64 longest_msg_time = 5;
  bool has_message = 6;
  uint64 latest_msg_time = 8;
  string peer_name = 9;
  uint64 longest_msg_seq = 10;
  uint64 uin_flag_ex2 = 11;
  uint32 important_msg_latest_seq = 12;
  uint32 group_max_event_seq = 13;
  uint32 random = 14;
  uint32 need_to_check_seq_on_aio_open = 15;
}

message GuildNode {
  uint64 peer_id = 1;
}

message GroupSystemNotifications {
  repeated GroupSystemNotificationsInfo infos = 3;
}

message SystemNotifications {
  repeated SystemNotificationsInfo infos = 4;
}

message GroupSystemNotificationsInfo {
  int64 group_code = 3;
  uint32 start_seq = 4;
  uint32 end_seq = 5;
  repeated message.v2.CommonMessage messages = 6;
  int64 last_speak_timestamp = 8;
}

message SystemNotificationsInfo {
  int64 peer_uin = 1;
  string peer_uid = 2;
  int64 last_speak_timestamp = 5;
  repeated message.v2.CommonMessage messages = 8;
}

message SsoHeartBeatRequest {
  uint32 type = 1;
  SilenceState local_silence = 2;
  uint32 battery_state = 3;
  uint64 time = 4;
}

message SsoHeartBeatResponse {
  uint64 interval = 3;
}

message SilenceState {
  uint32 local_silence = 1;
}

message PushParams {
  repeated OnlineDevice online_devices = 4;
  GuildParams guild_params = 6;
  string err_msg = 7;
  uint32 group_msg_storage_time = 9;
}

message GuildParams {
  uint32 guild_flag = 1;
  uint32 guild_switch_flag = 2;
}

message OnlineDevice {
  uint32 inst_id = 1;
  uint32 client_type = 2;
  uint32 state = 3;
  uint32 plat_id = 4;
  string plat_type = 5;
  uint32 new_client_type = 6;
  string device_name = 7;
}

message SsoC2CMsgCookie {
  uint64 c2_c_last_msg_time = 1;
}

message SsoC2CSyncInfo {
  SsoC2CMsgCookie c2_c_msg_cookie = 1;
  uint64 c2_c_last_msg_time = 2;
  SsoC2CMsgCookie last_c2_c_msg_cookie = 3;
}

message DeviceInfo {
  string dev_name = 1;
  string dev_type = 2;
  string os_ver = 3;
  string brand = 4;
  string vendor_os_name = 5;
}

message OnlineBusinessInfo {
  uint32 notify_switch = 1;
  uint32 bind_uin_notify_switch = 2;
}

message RegisterInfo {
  string guid = 1;
  uint32 kick_pc = 2;
  string build_ver = 3;
  uint32 is_first_register_proxy_online = 4;
  uint32 locale_id = 5;
  DeviceInfo device_info = 6;
  uint32 set_mute = 7;
  uint32 register_vendor_type = 8;
  uint32 reg_type = 9;
  OnlineBusinessInfo business_info = 10;
  uint32 battery_status = 11;
  int32 field12 = 12;
}

message NormalConfig {
  map<uint32, int32> int_cfg = 1;
}

message CurAppState {
  uint32 is_delay_request = 1;
  uint32 app_status = 2;
  uint32 silence_status = 3;
}

message SsoInfoSyncRequest {
  uint32 sync_flag = 1;
  uint32 req_random = 2;
  uint32 cur_active_status = 4;
  uint64 group_last_msg_time = 5;
  SsoC2CSyncInfo c2_c_sync_info = 6;
  NormalConfig normal_config = 8;
  RegisterInfo register_info = 9;
  map<uint32, uint32> unknown = 10;
  CurAppState app_state = 11;
}

message RegisterResponse {
  string msg = 2;
}

message SsoSyncInfoResponse {
  RegisterResponse register_response = 7;
}

message SsoUnregister {
  int32 reg_type = 1;
  DeviceInfo device_info = 2;
  int32 user_trigger = 3;
}

message ThirdPartyLoginResponse {
  uint64 seq = 1;
  RespCommonInfo common_info = 9;
}

message RespCommonInfo {
  uint32 need_verify_scenes = 10;
  RspNT rsp_nt = 11;
  uint32 a1_seq = 12;
}

message RspNT {
  string uid = 1;
  bytes ua2 = 2;
}
